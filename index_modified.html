<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المكتب التقني</title>
    <style>
        body { 
            /* قراءة صورة الخلفية الأصلية الخاصة بك المرفوعة في المستودع */
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), 
                        url('nm.png') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: system-ui, -apple-system, sans-serif; 
        }
        
        .box { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 30px; 
            border-radius: 24px; 
            width: 90%; 
            max-width: 600px; 
            text-align: center; 
            border: 1px solid rgba(56, 189, 248, 0.3); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
        }

        h2 {
            margin-top: 0;
            color: #38bdf8;
            font-size: 1.8rem;
            margin-bottom: 25px;
        }

        input { 
            width: 100%; 
            padding: 14px; 
            margin: 12px 0; 
            border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(15, 23, 42, 0.6); 
            color: white; 
            box-sizing: border-box; 
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }
        
        .btn, .level-item { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer;
        }

        .btn:hover, .level-item:hover { 
            transform: translateY(-2px); 
            filter: brightness(1.1);
            box-shadow: 0 8px 20px rgba(56, 189, 248, 0.4);
        }

        .btn { 
            width: 100%; 
            padding: 14px; 
            margin-top: 15px; 
            border-radius: 10px; 
            border: none; 
            background: #38bdf8; 
            color: #0f172a; 
            font-weight: bold; 
            font-size: 1.1rem;
        }
        
        .detail-img { 
            width: 100%; 
            max-width: 400px; 
            border-radius: 16px; 
            margin: 20px auto; 
            border: 2px solid rgba(56, 189, 248, 0.5); 
            display: block; 
        }

        .hidden { display: none !important; }
        
        .levels-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            margin: 25px 0; 
        }

        @media(min-width: 480px) {
            .levels-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .level-item { 
            padding: 18px 10px; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 0.95rem;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .level-item:nth-child(1) { background: #1a4d46; }
        .level-item:nth-child(2) { background: #6b2121; }
        .level-item:nth-child(3) { background: #71641a; opacity: 0.6; }
        .level-item:nth-child(4) { background: #4a2d5f; opacity: 0.6; }
        
        #material-input-box { margin-top: 25px; display: none; }
        .success-message { color: #34d399; font-size: 1.4rem; font-weight: bold; margin-top: 25px; }
    </style>
</head>
<body>

    <div id="form-section" class="box">
        <form id="contactForm" action="https://script.google.com/macros/s/AKfycbzeMGsFKMQDa7ePki8IpJDIL8TuCejzSReqnFNDOfpuqZnyubcd5FNlTASOR-1BVOmtUQ/exec" method="POST">
            <h2>نموذج التسجيل</h2>
            <input type="text" name="الاسم" placeholder="الاسم الثلاثي" required>
            <input type="text" name="السنة" placeholder="السنة الدراسية" required>
            <input type="tel" name="الهاتف" placeholder="رقم الهاتف" required>
            <input type="email" name="الايميل" placeholder="البريد الإلكتروني" required>
            <input type="hidden" name="التخصص" id="hidden-takhassos">
            <input type="hidden" name="المستوى" id="hidden-level">
            <input type="hidden" name="المادة" id="hidden-material">
            <button type="submit" class="btn">متابعة</button>
        </form>
    </div>

    <div id="options-section" class="box hidden">
        <h2>اختر التخصص البرمجي:</h2>
        <!-- استدعاء صورك الأصلية المرفوعة محلياً -->
        <button class="btn" onclick="showDetail('الجانب الإلكتروني', '111.png')">الجانب الإلكتروني</button>
        <button class="btn" onclick="showDetail('الجانب الميكانيكي', '3333.png')">الجانب الميكانيكي</button>
        <button class="btn" onclick="showDetail('الجانب البرمجي', '2222.png')">الجانب البرمجي</button>
    </div>

    <div id="detail-section" class="box hidden">
        <h2 id="detail-title"></h2>
        <img id="detail-image" src="" class="detail-img">
        <div class="levels-grid" id="levels-container"></div>
        <div id="material-input-box">
            <input type="text" id="user-material" placeholder="اكتب اسم المادة المراد دراستها...">
            <button class="btn" id="submit-btn" style="background:#10b981; color: white;" onclick="finish()">إرسال التسجيل</button>
        </div>
        <button class="btn" id="back-btn" style="background:#475569; color: white;" onclick="location.reload()">العودة</button>
        <div id="status-message" class="success-message hidden"></div>
    </div>

    <script>
        document.getElementById('contactForm').onsubmit = function(e) {
            e.preventDefault();
            document.getElementById('form-section').style.display = 'none';
            document.getElementById('options-section').classList.remove('hidden');
        };

        function showDetail(title, imgSrc) {
            document.getElementById('hidden-takhassos').value = title;
            document.getElementById('detail-title').innerText = title;
            document.getElementById('detail-image').src = imgSrc;
            
            const container = document.getElementById('levels-container');
            container.innerHTML = '';
            ['Level 1', 'Level 2', 'Level 3', 'Level 4'].forEach(lvl => {
                const div = document.createElement('div');
                div.className = 'level-item';
                div.innerText = lvl;
                div.onclick = () => {
                    if (lvl === 'Level 3' || lvl === 'Level 4') {
                        alert("عذراً، هذا المستوى غير متاح الآن.");
                        document.getElementById('material-input-box').style.display = 'none';
                        document.getElementById('hidden-level').value = '';
                    } else {
                        document.getElementById('hidden-level').value = lvl;
                        document.getElementById('material-input-box').style.display = 'block';
                    }
                };
                container.appendChild(div);
            });
            document.getElementById('options-section').classList.add('hidden');
            document.getElementById('detail-section').classList.remove('hidden');
        }

        function finish() {
            const mat = document.getElementById('user-material').value;
            if(!mat) { alert("يرجى كتابة اسم المادة المراد دراستها"); return; }
            document.getElementById('hidden-material').value = mat;
            
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.innerText = "جاري الإرسال وحفظ البيانات...";
            submitBtn.disabled = true;

            const form = document.getElementById('contactForm');
            const urlEncodedData = new URLSearchParams(new FormData(form)).toString();

            fetch(form.action, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: urlEncodedData,
                mode: 'no-cors'
            })
            .then(() => {
                document.getElementById('material-input-box').style.display = 'none';
                document.getElementById('levels-container').style.display = 'none';
                document.getElementById('back-btn').style.display = 'none';
                document.getElementById('detail-image').style.display = 'none';
                
                const statusMsg = document.getElementById('status-message');
                statusMsg.innerText = "🎉 تم إرسال تسجيلك بنجاح وحفظه في Google Sheets!";
                statusMsg.classList.remove('hidden');
            })
            .catch(error => {
                alert("حدث خطأ أثناء الإرسال، يرجى إعادة المحاولة.");
                submitBtn.innerText = "إرسال التسجيل";
                submitBtn.disabled = false;
                console.error('Error!', error);
            });
        }
    </script>
</body>
</html>
